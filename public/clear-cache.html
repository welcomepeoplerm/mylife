<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulizia Cache - MyLyfe Umbria</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    h1 {
      color: #667eea;
      margin-bottom: 20px;
      font-size: 28px;
      text-align: center;
    }
    
    .status {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 20px;
      margin: 20px 0;
      border-left: 4px solid #667eea;
    }
    
    .status-item {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #e9ecef;
    }
    
    .status-item:last-child {
      border-bottom: none;
    }
    
    .icon {
      font-size: 24px;
      margin-right: 15px;
      min-width: 30px;
    }
    
    .success { color: #28a745; }
    .error { color: #dc3545; }
    .warning { color: #ffc107; }
    .info { color: #17a2b8; }
    
    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
      transition: transform 0.2s;
    }
    
    .btn:hover {
      transform: scale(1.05);
    }
    
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .note {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 10px;
      padding: 15px;
      margin-top: 20px;
      font-size: 14px;
    }
    
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(0,0,0,.1);
      border-radius: 50%;
      border-top-color: #667eea;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧹 Pulizia Cache MyLyfe</h1>
    
    <p style="text-align: center; color: #6c757d; margin-bottom: 20px;">
      Questa pagina rimuoverà automaticamente i dati vecchi che causano il problema di reload continuo.
    </p>
    
    <div class="status" id="status">
      <div class="status-item">
        <span class="icon info">⏳</span>
        <span>Avvio pulizia...</span>
      </div>
    </div>
    
    <button class="btn" id="cleanBtn" onclick="startClean()">
      Avvia Pulizia Automatica
    </button>
    
    <div class="note">
      <strong>📝 Nota:</strong> Dopo la pulizia, questa pagina si ricaricherà automaticamente e potrai tornare all'app principale.
    </div>
  </div>

  <script>
    let statusDiv = document.getElementById('status');
    let cleanBtn = document.getElementById('cleanBtn');
    let results = [];
    
    function addStatus(icon, message, type = 'info') {
      results.push({ icon, message, type });
      updateStatus();
    }
    
    function updateStatus() {
      statusDiv.innerHTML = results.map(r => `
        <div class="status-item">
          <span class="icon ${r.type}">${r.icon}</span>
          <span>${r.message}</span>
        </div>
      `).join('');
    }
    
    async function startClean() {
      cleanBtn.disabled = true;
      cleanBtn.innerHTML = '<span class="spinner"></span> Pulizia in corso...';
      results = [];
      
      try {
        // 1. Unregister Service Workers
        addStatus('🔄', 'Rimozione Service Workers...', 'info');
        
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          let swCount = 0;
          
          for (let registration of registrations) {
            await registration.unregister();
            swCount++;
            addStatus('✅', `Service Worker ${swCount} rimosso`, 'success');
          }
          
          if (swCount === 0) {
            addStatus('ℹ️', 'Nessun Service Worker trovato', 'info');
          }
        } else {
          addStatus('⚠️', 'Service Workers non supportati', 'warning');
        }
        
        // 2. Clear Cache Storage
        addStatus('🔄', 'Pulizia Cache Storage...', 'info');
        
        if ('caches' in window) {
          const cacheNames = await caches.keys();
          let cacheCount = 0;
          
          for (let cacheName of cacheNames) {
            await caches.delete(cacheName);
            cacheCount++;
            addStatus('✅', `Cache "${cacheName}" rimossa`, 'success');
          }
          
          if (cacheCount === 0) {
            addStatus('ℹ️', 'Nessuna cache trovata', 'info');
          }
        } else {
          addStatus('⚠️', 'Cache API non supportata', 'warning');
        }
        
        // 3. Clear LocalStorage
        addStatus('🔄', 'Pulizia LocalStorage...', 'info');
        const lsKeys = Object.keys(localStorage).filter(key => 
          key.includes('mylyfe') || key.includes('firebase')
        );
        
        if (lsKeys.length > 0) {
          lsKeys.forEach(key => {
            localStorage.removeItem(key);
            addStatus('✅', `Rimosso: ${key}`, 'success');
          });
        } else {
          addStatus('ℹ️', 'LocalStorage già pulito', 'info');
        }
        
        // 4. Clear SessionStorage
        addStatus('🔄', 'Pulizia SessionStorage...', 'info');
        sessionStorage.clear();
        addStatus('✅', 'SessionStorage pulito', 'success');
        
        // 5. Clear IndexedDB
        addStatus('🔄', 'Pulizia IndexedDB...', 'info');
        if ('indexedDB' in window) {
          const databases = await indexedDB.databases?.() || [];
          
          for (let db of databases) {
            if (db.name.includes('firebase') || db.name.includes('mylyfe')) {
              indexedDB.deleteDatabase(db.name);
              addStatus('✅', `Database "${db.name}" rimosso`, 'success');
            }
          }
        }
        
        // Completato!
        addStatus('🎉', 'Pulizia completata con successo!', 'success');
        addStatus('🔄', 'Reload della pagina tra 3 secondi...', 'info');
        
        cleanBtn.innerHTML = '✅ Pulizia Completata!';
        
        // Reload dopo 3 secondi
        setTimeout(() => {
          window.location.href = '/';
        }, 3000);
        
      } catch (error) {
        console.error('Errore durante la pulizia:', error);
        addStatus('❌', `Errore: ${error.message}`, 'error');
        addStatus('💡', 'Prova a pulire manualmente la cache del browser', 'warning');
        
        cleanBtn.disabled = false;
        cleanBtn.innerHTML = 'Riprova';
      }
    }
    
    // Auto-start after 1 second
    setTimeout(() => {
      addStatus('✨', 'Pronto! Clicca il pulsante per iniziare', 'info');
    }, 500);
  </script>
</body>
</html>
